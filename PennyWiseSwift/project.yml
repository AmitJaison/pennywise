name: PennyWise
options:
  bundleIdPrefix: com.amitjaison
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  PennyWise:
    type: application
    platform: iOS
    sources:
      - PennyWise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amitjaison.pennywise
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Use Face ID to sign in to PennyWise"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic

  PennyWiseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PennyWiseTests
    dependencies:
      - target: PennyWise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amitjaison.pennywiseTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PennyWise:
    build:
      targets:
        PennyWise: all
    test:
      targets:
        - PennyWiseTests
    run:
      config: Debug
    archive:
      config: Release
